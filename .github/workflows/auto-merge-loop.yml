name: Auto-Merge Loop Branches

# Automatically merge loop/* branches to main when all tests pass.
# This gives Loop deploy authority with a safety net — code must pass
# the full test suite before it reaches production.

on:
  push:
    branches:
      - 'loop/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for merge
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest scikit-learn xgboost

      - name: Run full test suite
        id: tests
        run: |
          python -m pytest tests/ --tb=short -k 'not test_api' -q
          echo "test_result=$?" >> $GITHUB_OUTPUT

      - name: Auto-merge to main
        if: success()
        run: |
          git config user.name "Loop Auto-Merge"
          git config user.email "loop@polysignal.app"

          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH_NAME into main..."

          git fetch origin main
          git checkout main
          git merge --no-ff "$BRANCH_NAME" -m "auto-merge: $BRANCH_NAME (all tests passed)

          Automated merge by GitHub Actions.
          Branch: $BRANCH_NAME
          Tests: All passed
          Triggered by: Loop autonomous push"

          git push origin main

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const body = `## Auto-merge failed for \`${branch}\`\n\nTests did not pass. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nLoop: fix the failing tests and push again.`;

            // Create an issue to notify
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-merge failed: ${branch}`,
              body: body,
              labels: ['auto-merge-failure', 'loop'],
            });
