# PolySignal-OS Rescue (2026-03-20T16:13:18)
networks:

  internal-net:
    driver: bridge
    internal: true
  public-net:
    driver: bridge

services:
  backend:
    build: .
    # Bridge mode with internal access to OpenClaw
    networks:
      - internal-net
      - public-net
    ports:
      - "127.0.0.1:5000:5000" # Only accessible from localhost (for Cloudflared)
      - "127.0.0.1:8000:8000"
    restart: always
    env_file:
      - .env

    environment:
      - OPENCLAW_HOST=http://openclaw:9001
      - OLLAMA_HOST=http://172.17.0.1:11434
      # - GOOGLE_APPLICATION_CREDENTIALS= # Commented out to force AI Studio (API Key) fallback

    volumes:
      - ./data:/data
      - ./brain:/opt/loop/brain
      # Hot reload mappings
      - ./core:/app/core
      - ./agents:/app/agents
      - ./workflows:/app/workflows
      - ./lab:/app/lab
    command: /app/start.sh

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "0.0.0.0:3000:3000"
    networks:
      - public-net
    volumes:
      - ./frontend:/app
    command: sh -c "ls -la /app && npm install && npm run dev"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    network_mode: "host"

  openclaw:
    build: .
    container_name: openclaw-subjugated
    command: uvicorn core.openclaw_api:app --host 0.0.0.0 --port 9001
    runtime: nvidia
    networks:
      - internal-net
      - public-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - http_proxy=http://host.docker.internal:3128
      - https_proxy=http://host.docker.internal:3128
      - HTTP_PROXY=http://host.docker.internal:3128
      - HTTPS_PROXY=http://host.docker.internal:3128
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
        limits:
          memory: 16G
    volumes:
      - ./data:/data
      - ./data/logs:/var/log/openclaw
      - ./brain:/opt/loop/brain
